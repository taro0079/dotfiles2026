config = { diagnostic = true, formatting = true }

# =========================================
#  Language Configuration
# =========================================

[[language]]
name = "php"
indent = { tab-width = 4, unit = "    "}
# lsp-ai を追加
language-servers = [
{name = "intelephense"},
{name = "hx-lsp"},
# {name = "gpt"},
{name = "typos"},
{name = "efm"},
# {name = "phpactor", except-features = ['completion']},
# {name = "php-test-generator"}
]

# formatter = { command = "bash", args = [ "-c", "cat > /tmp/helix_php_cs_fixer && php-cs-fixer fix --config=$PWD/.php-cs-fixer.dist.php --using-cache=no --quiet /tmp/helix_php_cs_fixer && cat /tmp/helix_php_cs_fixer"]}
# formatter = {command = "php-cs-fixer", args = ["fix", "%{buffer_name}"]}
auto-format = false

[[language]]
name = "toml"
language-servers = ["typos", "lsp-ai"]

[[language]]
name = "yaml"
file-types = ["yaml", "yml"]
indent = { tab-width = 4, unit = "    "}
language-servers = ["yaml-language-server", "typos-lsp"]

[[language]]
name = "typescript"
language-servers = [ "typescript-language-server", "eslint", "emmet-ls", "lsp-ai", "gpt"]
formatter = { command = "prettier", args = [ "--parser", "typescript" ] }
auto-format = false

[[language]]
name = "tsx"
# lsp-ai を追加
language-servers = [ "typescript-language-server", "eslint", "typos", "lsp-ai", "gpt"]
formatter = { command = "prettier", args = [ "--parser", "typescript" ] }
auto-format = true

[[language]]
name = "rust"
# rust-analyzer と lsp-ai を有効化
language-servers = ["rust-analyzer", "lsp-ai"]
auto-format = true

[[language]]
name = "go"
# lsp-ai を追加
language-servers = [ "gopls", "hx-lsp", "typos-lsp", "gpt"]
formatter = { command = "gofmt" }
auto-format = true

[[language]]
name = "python"
# lsp-ai を追加
language-servers = ["pyright", "lsp-ai", "gpt"]
formatter = { command = "uv", args = ["run", "ruff", "format", "--stdin-filename", "{file}"] }
auto-format = true

[[language]]
name = "ruby"
auto-format = true
formatter = { command = "bundle", args = ["exec", "rubocop", "--server", "--autocorrect", "--fail-level", "error", "--stdin", "corrected.rb", "--stderr"] }
language-servers = [ "ruby-lsp", "gpt", "typos", "hx-lsp", "rubocop", "solargraph"]

[[language]]
name = "erb"
file-types = ["erb"]
language-servers = ["ruby-lsp", "vscode-html-language-server"]
formatter = { command = "erb-format", args = ["--stdin", "--print-width", "80"] }
auto-format = true

[[language]]
name = "html"
file-types = ["html", "tpl" ]
auto-format = false
# HTMLでもAI補完を使いたい場合
language-servers = [ "vscode-html-language-server", "lsp-ai" ]
formatter = { command = "prettier", args = ["--parser", "html"] }

[[language]]
name = "markdown"
language-servers = ["marksman", "markdown-oxide", "mdpls", 'hx-lsp', 'typos']

[language-server.mdpls]
command = "mdpls"
config = {markdown.preview.auto = true }



