## Fix Colors
## ref: https://github.com/SmiteshP/Dotfiles/blob/946cde45d8349d50446629939cebd7e4091a3775/.tmux.conf#L3
# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
# set -as terminal-features ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"
# Extended keys (CSI u) - C-. などの拡張キーシーケンスを Neovim に渡すために必要
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g status-style 'bg=#333333 fg=#5eacd3'
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#5eacd3'
set -g pane-border-status top
set -g pane-border-format ' #P '

set -g window-status-style 'fg=#888888 bg=#333333'
set -g window-status-current-style 'fg=#000000 bg=#5eacd3 bold'

set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '
# Reduce escape time
set -sg escape-time 0

# Tile all windows
unbind =
bind = select-layout tiled

# Make window/pane index start with 1
set -g base-index 1


# Reload config file
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split window and fix path for tmux 1.9
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Synchronize all panes in a window
bind y setw synchronize-panes

# Pane movement shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resize pane shortcuts
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Enable mouse support for switching panes/windows
setw -g mouse on

# Set vi mode for copy mode
setw -g mode-keys vi
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind -T copy-mode-vi v send -X begin-selection
if-shell -b '[ "$(uname)" = "Linux" ]' {
  set -s copy-command "xsel --clipboard --input"
  display "using xsel as copy-command"
}
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel -i -p && xsel -o -p | xsel -i -b"
bind-key p run "xsel -o | tmux load-buffer - ; tmux paste-buffer"
set -g set-clipboard on

# tmux sessionizer
bind-key -r f send-keys "tmux neww ~/.local/scripts/tmux-sessionizer.sh"
# bind-key f neww bash -c "~/.local/scripts/tmux-sessionizer.sh"
bind-key -r i run-shell "~/.local/scripts/tmux-sessionizer.sh ~/ghq/github.com/PRECS-Inc/rpst-v2/"
bind-key -r o run-shell "~/.local/scripts/tmux-sessionizer.sh ~/ghq/github.com/PRECS-Inc/rpst/"
bind-key -r u run-shell "~/.local/scripts/tmux-sessionizer.sh ~/ghq/github.com/PRECS-Inc/rpst-api"

bind y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
"tmux new-session '~/.local/scripts/yazi-popup.sh #{pane_id}' \\; set status off \\; set detach-on-destroy on"
